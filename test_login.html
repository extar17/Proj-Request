<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест входа v2</title>
</head>
<body>
    <h2>Тестовая форма входа (v2)</h2>
    
    <form id="testForm">
        <input type="text" id="login" placeholder="Логин" value="moderator@novsu.ru" style="width:250px; padding:8px; margin:5px;">
        <br>
        <input type="password" id="password" placeholder="Пароль" value="Moderator123!" style="width:250px; padding:8px; margin:5px;">
        <br>
        <button type="submit" style="padding:10px 30px; margin:10px 0;">Войти</button>
    </form>

    <h3>Результат:</h3>
    <pre id="result" style="background:#f5f5f5; padding:20px; min-height:200px;"></pre>

    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resultEl = document.getElementById('result');
            resultEl.textContent = '';
            
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            
            // Сначала пробуем debug-скрипт
            resultEl.textContent = '=== ТЕСТ 1: debug_auth.php ===\n';
            
            const formData1 = new FormData();
            formData1.append('login', login);
            formData1.append('password', password);
            
            try {
                const resp1 = await fetch('api/debug_auth.php', {
                    method: 'POST',
                    body: formData1
                });
                const text1 = await resp1.text();
                resultEl.textContent += 'Статус: ' + resp1.status + '\n';
                resultEl.textContent += 'Ответ: ' + text1 + '\n';
                
                try {
                    const json1 = JSON.parse(text1);
                    resultEl.textContent += 'JSON ОК: ' + JSON.stringify(json1, null, 2) + '\n';
                } catch(e) {
                    resultEl.textContent += 'НЕ JSON!\n';
                }
            } catch(err) {
                resultEl.textContent += 'ОШИБКА: ' + err.message + '\n';
            }
            
            // Затем пробуем основной auth.php
            resultEl.textContent += '\n=== ТЕСТ 2: auth.php ===\n';
            
            const formData2 = new FormData();
            formData2.append('login', login);
            formData2.append('password', password);
            
            try {
                const resp2 = await fetch('api/auth.php?action=login', {
                    method: 'POST',
                    body: formData2
                });
                const text2 = await resp2.text();
                resultEl.textContent += 'Статус: ' + resp2.status + '\n';
                resultEl.textContent += 'Ответ: ' + text2 + '\n';
                
                try {
                    const json2 = JSON.parse(text2);
                    resultEl.textContent += 'JSON ОК: ' + JSON.stringify(json2, null, 2) + '\n';
                } catch(e) {
                    resultEl.textContent += 'НЕ JSON!\n';
                }
            } catch(err) {
                resultEl.textContent += 'ОШИБКА: ' + err.message + '\n';
            }
        });
    </script>
</body>
</html>
